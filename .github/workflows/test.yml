name: Run Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Jest
        run: npm install jest --save-dev

      - name: Run Tests
        run: npx jest

      - name: Notify n8n on Failure
        if: failure()
        run: |
          CHECK_ID=$(curl -s -H "Authorization: token ${{ github.token }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/check-runs" \
            | jq '.check_runs[0].id')

          curl -X POST https://heterofermentative-unbleeding-jutta.ngrok-free.dev/webhook/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 \
          -H "Content-Type: application/json" \
          -d "{
            \"action\": \"completed\",
            \"telegram_chat_id\": \"6150806884\",
            \"repo\": \"${{ github.repository }}\",
            \"run_id\": \"${{ github.run_id }}\",
            \"check_run_id\": \"$CHECK_ID\",
            \"check_run\": {
              \"status\": \"completed\",
              \"conclusion\": \"failure\",
              \"output\": {
                \"summary\": \"Jest tests failed on branch main\",
                \"text\": \"Check ID found: $CHECK_ID. Please review the annotations.\"
              }
            }
          }"
